<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-immich-title">
  <title id="schema-immich-title">Architecture Immich — serveur, machine learning, PostgreSQL, Redis ; seul le serveur rejoint le réseau proxy</title>
  <defs>
    <marker id="arr-im" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .box-soft { fill: #1e3a5f; stroke: #1e3a5f; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .label-on-blue { fill: #f5f0e6; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .sub-on-blue { fill: #d1d9e0; opacity: 0.85; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-im); }
    .net { stroke: #ffb627; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; }
    .net-int { stroke: currentColor; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; opacity: 0.6; }
  </style>

  <!-- App mobile / web -->
  <text class="label" x="150" y="22" text-anchor="middle" data-lang="fr">App mobile · Web</text>
  <text class="label" x="150" y="22" text-anchor="middle" data-lang="en">Mobile app · Web</text>
  <path class="arrow-line" d="M 150 30 L 150 42"/>

  <!-- Traefik -->
  <rect class="box-accent" x="50" y="46" width="200" height="50" rx="3"/>
  <text class="label label-on-fill" x="150" y="66" text-anchor="middle">Traefik v3</text>
  <text class="sub sub-on-fill" x="150" y="84" text-anchor="middle">HTTPS · :443 · certresolver le</text>
  <path class="arrow-line" d="M 190 96 L 330 148"/>

  <!-- réseau interne Immich (default) -->
  <rect class="net-int" x="290" y="106" width="430" height="214" rx="4"/>
  <text class="sub" x="708" y="124" text-anchor="end" data-lang="fr">réseau interne Immich · default</text>
  <text class="sub" x="708" y="124" text-anchor="end" data-lang="en">Immich internal network · default</text>

  <!-- réseau proxy (external) -->
  <rect class="net" x="40" y="118" width="440" height="140" rx="4"/>
  <text class="sub" x="55" y="136" data-lang="fr">réseau Docker partagé · proxy (external)</text>
  <text class="sub" x="55" y="136" data-lang="en">shared Docker network · proxy (external)</text>

  <!-- immich-server (sur les 2 réseaux / on both networks) -->
  <rect class="box-soft" x="310" y="152" width="150" height="76" rx="3"/>
  <text class="label label-on-blue" x="385" y="176" text-anchor="middle">immich-server</text>
  <text class="sub sub-on-blue" x="385" y="192" text-anchor="middle">port 2283</text>
  <text class="sub sub-on-blue" x="385" y="208" text-anchor="middle" data-lang="fr">labels traefik.*</text>
  <text class="sub sub-on-blue" x="385" y="208" text-anchor="middle" data-lang="en">traefik.* labels</text>

  <!-- services internes / internal services -->
  <path class="arrow-line" d="M 460 172 L 517 152"/>
  <rect class="box" x="520" y="132" width="180" height="46" rx="3"/>
  <text class="label" x="610" y="150" text-anchor="middle">immich-machine-learning</text>
  <text class="sub" x="610" y="166" text-anchor="middle" data-lang="fr">IA · visages · recherche</text>
  <text class="sub" x="610" y="166" text-anchor="middle" data-lang="en">AI · faces · search</text>

  <path class="arrow-line" d="M 460 190 L 517 208"/>
  <rect class="box" x="520" y="188" width="180" height="46" rx="3"/>
  <text class="label" x="610" y="206" text-anchor="middle">postgres</text>
  <text class="sub" x="610" y="222" text-anchor="middle" data-lang="fr">métadonnées · albums · visages</text>
  <text class="sub" x="610" y="222" text-anchor="middle" data-lang="en">metadata · albums · faces</text>

  <path class="arrow-line" d="M 460 210 L 517 262"/>
  <rect class="box" x="520" y="244" width="180" height="46" rx="3"/>
  <text class="label" x="610" y="262" text-anchor="middle">redis</text>
  <text class="sub" x="610" y="278" text-anchor="middle" data-lang="fr">cache · files de jobs</text>
  <text class="sub" x="610" y="278" text-anchor="middle" data-lang="en">cache · job queues</text>

  <text class="sub" x="610" y="308" text-anchor="middle" data-lang="fr">jamais sur le réseau proxy</text>
  <text class="sub" x="610" y="308" text-anchor="middle" data-lang="en">never on the proxy network</text>

  <!-- volume photos -->
  <path class="arrow-line" d="M 385 228 L 385 330"/>
  <rect class="box" x="295" y="334" width="180" height="40" rx="3"/>
  <text class="label" x="385" y="352" text-anchor="middle">UPLOAD_LOCATION</text>
  <text class="sub" x="385" y="367" text-anchor="middle" data-lang="fr">photos sur disque hôte — l'irremplaçable</text>
  <text class="sub" x="385" y="367" text-anchor="middle" data-lang="en">photos on host disk — the irreplaceable part</text>
</svg>
