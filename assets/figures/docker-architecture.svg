<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-docker-title">
  <title id="schema-docker-title">Architecture Docker — client, daemon, images, conteneurs et registry / Docker architecture — client, daemon, images, containers and registry</title>
  <defs>
    <marker id="arr-dk" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .box-soft { fill: #1e3a5f; stroke: #1e3a5f; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .label-on-blue { fill: #f5f0e6; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .sub-on-blue { fill: #d1d9e0; opacity: 0.85; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-dk); }
    .net { stroke: #ffb627; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Machine hôte / Host machine -->
  <rect class="net" x="30" y="42" width="480" height="296" rx="4"/>
  <text class="sub" x="45" y="62" data-lang="fr">machine hôte</text>
  <text class="sub" x="45" y="62" data-lang="en">host machine</text>

  <!-- Client : docker CLI -->
  <rect class="box" x="60" y="90" width="150" height="64" rx="3"/>
  <text class="label" x="135" y="114" text-anchor="middle">docker CLI</text>
  <text class="sub" x="135" y="130" text-anchor="middle" data-lang="fr">client (toi)</text>
  <text class="sub" x="135" y="130" text-anchor="middle" data-lang="en">client (you)</text>
  <text class="sub" x="135" y="144" text-anchor="middle">run · build · pull</text>

  <!-- client → daemon -->
  <path class="arrow-line" d="M 210 122 L 295 122"/>
  <text class="sub" x="252" y="112" text-anchor="middle">API</text>

  <!-- Daemon : dockerd -->
  <rect class="box-accent" x="298" y="90" width="180" height="64" rx="3"/>
  <text class="label label-on-fill" x="388" y="114" text-anchor="middle">dockerd</text>
  <text class="sub sub-on-fill" x="388" y="130" text-anchor="middle" data-lang="fr">daemon Docker</text>
  <text class="sub sub-on-fill" x="388" y="130" text-anchor="middle" data-lang="en">Docker daemon</text>
  <text class="sub sub-on-fill" x="388" y="144" text-anchor="middle" data-lang="fr">fait le vrai travail</text>
  <text class="sub sub-on-fill" x="388" y="144" text-anchor="middle" data-lang="en">does the real work</text>

  <!-- daemon → images / conteneurs -->
  <path class="arrow-line" d="M 350 154 L 175 217"/>
  <path class="arrow-line" d="M 400 154 L 400 217"/>

  <!-- Images -->
  <rect class="box" x="60" y="220" width="180" height="76" rx="3"/>
  <text class="label" x="150" y="244" text-anchor="middle">Images</text>
  <text class="sub" x="150" y="260" text-anchor="middle" data-lang="fr">templates figés (recette)</text>
  <text class="sub" x="150" y="260" text-anchor="middle" data-lang="en">frozen templates (recipe)</text>
  <text class="sub" x="150" y="276" text-anchor="middle">nginx:1.27 · postgres:16</text>

  <!-- images → conteneurs -->
  <path class="arrow-line" d="M 240 258 L 305 258"/>
  <text class="sub" x="272" y="248" text-anchor="middle">run</text>

  <!-- Conteneurs / Containers -->
  <rect class="box-soft" x="308" y="220" width="180" height="76" rx="3"/>
  <text class="label label-on-blue" x="398" y="244" text-anchor="middle" data-lang="fr">Conteneurs</text>
  <text class="label label-on-blue" x="398" y="244" text-anchor="middle" data-lang="en">Containers</text>
  <text class="sub sub-on-blue" x="398" y="260" text-anchor="middle" data-lang="fr">instances vivantes (le plat)</text>
  <text class="sub sub-on-blue" x="398" y="260" text-anchor="middle" data-lang="en">live instances (the dish)</text>
  <text class="sub sub-on-blue" x="398" y="276" text-anchor="middle">volumes · networks · env</text>

  <!-- Registry -->
  <rect class="box" x="570" y="90" width="160" height="76" rx="3"/>
  <text class="label" x="650" y="114" text-anchor="middle">Registry</text>
  <text class="sub" x="650" y="130" text-anchor="middle">Docker Hub</text>
  <text class="sub" x="650" y="146" text-anchor="middle" data-lang="fr">images publiques/privées</text>
  <text class="sub" x="650" y="146" text-anchor="middle" data-lang="en">public/private images</text>

  <!-- pull : registry → daemon -->
  <path class="arrow-line" d="M 570 108 L 481 108"/>
  <text class="sub" x="524" y="99" text-anchor="middle">docker pull</text>

  <!-- push : daemon → registry -->
  <path class="arrow-line" d="M 478 140 L 567 140"/>
  <text class="sub" x="524" y="158" text-anchor="middle">docker push</text>
</svg>
