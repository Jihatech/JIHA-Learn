<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-compose-title">
  <title id="schema-compose-title">Une stack Docker Compose — services, réseau et volume déclarés dans un seul fichier / A Docker Compose stack — services, network and volume declared in a single file</title>
  <defs>
    <marker id="arr-cs" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .box-soft { fill: #1e3a5f; stroke: #1e3a5f; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .label-on-blue { fill: #f5f0e6; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .sub-on-blue { fill: #d1d9e0; opacity: 0.85; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-cs); }
    .net { stroke: #ffb627; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; }
  </style>

  <!-- compose.yaml -->
  <rect class="box-accent" x="270" y="20" width="220" height="60" rx="3"/>
  <text class="label label-on-fill" x="380" y="44" text-anchor="middle">compose.yaml</text>
  <text class="sub sub-on-fill" x="380" y="62" text-anchor="middle" data-lang="fr">1 fichier = toute la stack</text>
  <text class="sub sub-on-fill" x="380" y="62" text-anchor="middle" data-lang="en">one file = the whole stack</text>

  <!-- docker compose up -d -->
  <text class="sub" x="392" y="102" data-lang="fr">docker compose up -d · déclare services + réseau + volume</text>
  <text class="sub" x="392" y="102" data-lang="en">docker compose up -d · declares services + network + volume</text>

  <!-- flèches compose.yaml -> services -->
  <path class="arrow-line" d="M 320 80 L 180 160"/>
  <path class="arrow-line" d="M 380 80 L 380 160"/>
  <path class="arrow-line" d="M 440 80 L 580 160"/>

  <!-- réseau de la stack -->
  <rect class="net" x="60" y="128" width="640" height="128" rx="4"/>
  <text class="sub" x="75" y="146" data-lang="fr">réseau de la stack · créé automatiquement · DNS interne par nom de service</text>
  <text class="sub" x="75" y="146" data-lang="en">stack network · created automatically · internal DNS by service name</text>

  <!-- service app -->
  <rect class="box-soft" x="100" y="164" width="160" height="64" rx="3"/>
  <text class="label label-on-blue" x="180" y="186" text-anchor="middle">app</text>
  <text class="sub sub-on-blue" x="180" y="202" text-anchor="middle">wordpress:6.8</text>
  <text class="sub sub-on-blue" x="180" y="218" text-anchor="middle">ports 8080:80</text>

  <!-- service db -->
  <rect class="box-soft" x="300" y="164" width="160" height="64" rx="3"/>
  <text class="label label-on-blue" x="380" y="186" text-anchor="middle">db</text>
  <text class="sub sub-on-blue" x="380" y="202" text-anchor="middle">mariadb:11.4</text>
  <text class="sub sub-on-blue" x="380" y="218" text-anchor="middle" data-lang="fr">healthcheck · jamais exposée</text>
  <text class="sub sub-on-blue" x="380" y="218" text-anchor="middle" data-lang="en">healthcheck · never exposed</text>

  <!-- service cache -->
  <rect class="box-soft" x="500" y="164" width="160" height="64" rx="3"/>
  <text class="label label-on-blue" x="580" y="186" text-anchor="middle">cache</text>
  <text class="sub sub-on-blue" x="580" y="202" text-anchor="middle">redis:7.4</text>
  <text class="sub sub-on-blue" x="580" y="218" text-anchor="middle" data-lang="fr">optionnel</text>
  <text class="sub sub-on-blue" x="580" y="218" text-anchor="middle" data-lang="en">optional</text>

  <!-- liens app -> db / cache -->
  <path class="arrow-line" d="M 260 196 L 296 196"/>
  <path class="arrow-line" d="M 460 196 L 496 196"/>

  <!-- flèche db -> volume -->
  <path class="arrow-line" d="M 380 228 L 380 288"/>
  <text class="sub" x="392" y="266" data-lang="fr">la donnée survit au conteneur</text>
  <text class="sub" x="392" y="266" data-lang="en">data outlives the container</text>

  <!-- volume -->
  <rect class="box" x="290" y="292" width="180" height="52" rx="3"/>
  <text class="label" x="380" y="313" text-anchor="middle">volume db-data</text>
  <text class="sub" x="380" y="330" text-anchor="middle" data-lang="fr">données persistantes</text>
  <text class="sub" x="380" y="330" text-anchor="middle" data-lang="en">persistent data</text>
</svg>
