<svg viewBox="0 0 760 372" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-monitoring-title">
  <title id="schema-monitoring-title">Chaîne de monitoring — exporters, Prometheus, Grafana, alertes / Monitoring chain — exporters, Prometheus, Grafana, alerts</title>
  <defs>
    <marker id="arr-mon" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .box-soft { fill: #1e3a5f; stroke: #1e3a5f; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .label-on-blue { fill: #f5f0e6; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .sub-on-blue { fill: #d1d9e0; opacity: 0.85; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-mon); }
    .net { stroke: #ffb627; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Serveur / Server -->
  <text class="label" x="380" y="20" text-anchor="middle" data-lang="fr">Ton serveur</text>
  <text class="label" x="380" y="20" text-anchor="middle" data-lang="en">Your server</text>

  <!-- Exporters -->
  <rect class="box" x="60" y="40" width="180" height="64" rx="3"/>
  <text class="label" x="150" y="62" text-anchor="middle">node-exporter</text>
  <text class="sub" x="150" y="78" text-anchor="middle">:9100</text>
  <text class="sub" x="150" y="92" text-anchor="middle" data-lang="fr">CPU · RAM · disque · réseau</text>
  <text class="sub" x="150" y="92" text-anchor="middle" data-lang="en">CPU · RAM · disk · network</text>

  <rect class="box" x="290" y="40" width="180" height="64" rx="3"/>
  <text class="label" x="380" y="62" text-anchor="middle">cAdvisor</text>
  <text class="sub" x="380" y="78" text-anchor="middle">:8080</text>
  <text class="sub" x="380" y="92" text-anchor="middle" data-lang="fr">métriques par conteneur</text>
  <text class="sub" x="380" y="92" text-anchor="middle" data-lang="en">per-container metrics</text>

  <rect class="box" x="520" y="40" width="180" height="64" rx="3"/>
  <text class="label" x="610" y="62" text-anchor="middle" data-lang="fr">Apps avec /metrics</text>
  <text class="label" x="610" y="62" text-anchor="middle" data-lang="en">Apps with /metrics</text>
  <text class="sub" x="610" y="80" text-anchor="middle" data-lang="fr">exporters spécifiques…</text>
  <text class="sub" x="610" y="80" text-anchor="middle" data-lang="en">service exporters…</text>

  <!-- réseau interne -->
  <rect class="net" x="36" y="28" width="688" height="216" rx="4"/>
  <text class="sub" x="50" y="236" data-lang="fr">réseau Docker interne · default (non exposé)</text>
  <text class="sub" x="50" y="236" data-lang="en">internal Docker network · default (not exposed)</text>

  <!-- scrape (pull) -->
  <path class="arrow-line" d="M 150 104 L 300 164"/>
  <path class="arrow-line" d="M 380 104 L 380 164"/>
  <path class="arrow-line" d="M 610 104 L 460 164"/>
  <text class="sub" x="470" y="140" data-lang="fr">scrape (pull) · 15 s</text>
  <text class="sub" x="470" y="140" data-lang="en">scrape (pull) · 15s</text>

  <!-- Prometheus -->
  <rect class="box-accent" x="230" y="168" width="300" height="64" rx="3"/>
  <text class="label label-on-fill" x="380" y="190" text-anchor="middle">Prometheus :9090</text>
  <text class="sub sub-on-fill" x="380" y="206" text-anchor="middle" data-lang="fr">TSDB · rétention 30 j · PromQL</text>
  <text class="sub sub-on-fill" x="380" y="206" text-anchor="middle" data-lang="en">TSDB · 30-day retention · PromQL</text>
  <text class="sub sub-on-fill" x="380" y="221" text-anchor="middle" data-lang="fr">va chercher les métriques (pull)</text>
  <text class="sub sub-on-fill" x="380" y="221" text-anchor="middle" data-lang="en">fetches the metrics (pull)</text>

  <!-- Flux sortants -->
  <path class="arrow-line" d="M 310 232 L 215 288"/>
  <text class="sub" x="150" y="266" data-lang="fr">requêtes PromQL</text>
  <text class="sub" x="150" y="266" data-lang="en">PromQL queries</text>
  <path class="arrow-line" d="M 450 232 L 545 288"/>
  <text class="sub" x="540" y="266" data-lang="fr">alertes</text>
  <text class="sub" x="540" y="266" data-lang="en">alerts</text>

  <!-- Grafana -->
  <rect class="box-soft" x="90" y="292" width="240" height="64" rx="3"/>
  <text class="label label-on-blue" x="210" y="314" text-anchor="middle">Grafana :3000</text>
  <text class="sub sub-on-blue" x="210" y="330" text-anchor="middle" data-lang="fr">dashboards · règles d'alerte</text>
  <text class="sub sub-on-blue" x="210" y="330" text-anchor="middle" data-lang="en">dashboards · alert rules</text>
  <text class="sub sub-on-blue" x="210" y="345" text-anchor="middle" data-lang="fr">exposé via Traefik (HTTPS)</text>
  <text class="sub sub-on-blue" x="210" y="345" text-anchor="middle" data-lang="en">exposed via Traefik (HTTPS)</text>

  <!-- Alertmanager -->
  <rect class="box" x="430" y="292" width="240" height="64" rx="3"/>
  <text class="label" x="550" y="314" text-anchor="middle">Alertmanager</text>
  <text class="sub" x="550" y="330" text-anchor="middle" data-lang="fr">optionnel · déduplication, routage</text>
  <text class="sub" x="550" y="330" text-anchor="middle" data-lang="en">optional · deduplication, routing</text>
  <text class="sub" x="550" y="345" text-anchor="middle" data-lang="fr">→ Discord / Telegram / e-mail</text>
  <text class="sub" x="550" y="345" text-anchor="middle" data-lang="en">→ Discord / Telegram / email</text>
</svg>
