<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-git-areas-title">
  <title id="schema-git-areas-title">Les zones de Git : répertoire de travail, staging, dépôt local, dépôt distant / Git's areas: working directory, staging, local repository, remote</title>
  <defs>
    <marker id="arr-ga" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .box-soft { fill: #1e3a5f; stroke: #1e3a5f; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .label-on-blue { fill: #f5f0e6; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .sub-on-blue { fill: #d1d9e0; opacity: 0.85; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-ga); }
    .net { stroke: #ffb627; stroke-dasharray: 5,3; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Titre -->
  <text class="label" x="380" y="26" text-anchor="middle" data-lang="fr">Les zones de Git</text>
  <text class="label" x="380" y="26" text-anchor="middle" data-lang="en">Git's areas</text>

  <!-- Zone machine locale -->
  <rect class="net" x="18" y="56" width="528" height="252" rx="4"/>
  <text class="sub" x="32" y="76" data-lang="fr">ta machine · local</text>
  <text class="sub" x="32" y="76" data-lang="en">your machine · local</text>

  <!-- Zone serveur distant -->
  <rect class="net" x="584" y="56" width="158" height="252" rx="4"/>
  <text class="sub" x="596" y="76" data-lang="fr">serveur distant</text>
  <text class="sub" x="596" y="76" data-lang="en">remote server</text>

  <!-- Répertoire de travail -->
  <rect class="box" x="30" y="140" width="120" height="84" rx="3"/>
  <text class="label" x="90" y="168" text-anchor="middle" data-lang="fr">Répertoire</text>
  <text class="label" x="90" y="184" text-anchor="middle" data-lang="fr">de travail</text>
  <text class="label" x="90" y="168" text-anchor="middle" data-lang="en">Working</text>
  <text class="label" x="90" y="184" text-anchor="middle" data-lang="en">directory</text>
  <text class="sub" x="90" y="208" text-anchor="middle" data-lang="fr">fichiers édités</text>
  <text class="sub" x="90" y="208" text-anchor="middle" data-lang="en">edited files</text>

  <!-- Staging -->
  <rect class="box" x="220" y="140" width="110" height="84" rx="3"/>
  <text class="label" x="275" y="176" text-anchor="middle">Staging</text>
  <text class="sub" x="275" y="196" text-anchor="middle" data-lang="fr">prêt à commit</text>
  <text class="sub" x="275" y="196" text-anchor="middle" data-lang="en">ready to commit</text>
  <text class="sub" x="275" y="210" text-anchor="middle">index</text>

  <!-- Dépôt local -->
  <rect class="box-accent" x="400" y="140" width="130" height="84" rx="3"/>
  <text class="label label-on-fill" x="465" y="168" text-anchor="middle" data-lang="fr">Dépôt local</text>
  <text class="label label-on-fill" x="465" y="168" text-anchor="middle" data-lang="en">Local repo</text>
  <text class="sub sub-on-fill" x="465" y="190" text-anchor="middle">.git/ · commits</text>
  <text class="sub sub-on-fill" x="465" y="204" text-anchor="middle" data-lang="fr">branches · HEAD</text>
  <text class="sub sub-on-fill" x="465" y="204" text-anchor="middle" data-lang="en">branches · HEAD</text>

  <!-- Dépôt distant -->
  <rect class="box-soft" x="606" y="140" width="124" height="84" rx="3"/>
  <text class="label label-on-blue" x="668" y="168" text-anchor="middle" data-lang="fr">Dépôt</text>
  <text class="label label-on-blue" x="668" y="184" text-anchor="middle" data-lang="fr">distant</text>
  <text class="label label-on-blue" x="668" y="176" text-anchor="middle" data-lang="en">Remote</text>
  <text class="sub sub-on-blue" x="668" y="208" text-anchor="middle">origin (GitHub)</text>

  <!-- Flèches aller : add, commit, push -->
  <path class="arrow-line" d="M 150 174 L 216 174"/>
  <text class="sub" x="183" y="164" text-anchor="middle">git add</text>

  <path class="arrow-line" d="M 330 174 L 396 174"/>
  <text class="sub" x="363" y="164" text-anchor="middle">git commit</text>

  <path class="arrow-line" d="M 530 174 L 602 174"/>
  <text class="sub" x="566" y="164" text-anchor="middle">git push</text>

  <!-- Flèche retour : pull -->
  <path class="arrow-line" d="M 668 224 C 668 288, 90 288, 90 228"/>
  <text class="sub" x="379" y="268" text-anchor="middle">git pull (fetch + merge)</text>
</svg>
