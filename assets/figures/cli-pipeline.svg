<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="schema-cli-title">
  <title id="schema-cli-title">Anatomie d'un pipeline shell / Anatomy of a shell pipeline — stdin → commandes → stdout</title>
  <defs>
    <marker id="arr-cli" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .box-accent { fill: #ffb627; stroke: #c98d10; stroke-width: 1.5; }
    .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: currentColor; font-weight: 600; }
    .label-on-fill { fill: #0d1117; }
    .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: currentColor; opacity: 0.65; }
    .sub-on-fill { fill: #0d1117; opacity: 0.7; }
    .arrow-line { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arr-cli); }
    .arrow-err { stroke: currentColor; stroke-width: 1.5; stroke-dasharray: 5,3; fill: none; marker-end: url(#arr-cli); opacity: 0.7; }
    .pipe { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 15px; fill: #ffb627; font-weight: 700; }
  </style>

  <!-- Titre -->
  <text class="label" x="380" y="28" text-anchor="middle" data-lang="fr">Anatomie d'un pipeline shell</text>
  <text class="label" x="380" y="28" text-anchor="middle" data-lang="en">Anatomy of a shell pipeline</text>

  <!-- stdin -->
  <rect class="box" x="20" y="64" width="110" height="52" rx="3"/>
  <text class="label" x="75" y="86" text-anchor="middle">stdin</text>
  <text class="sub" x="75" y="102" text-anchor="middle" data-lang="fr">clavier / fichier</text>
  <text class="sub" x="75" y="102" text-anchor="middle" data-lang="en">keyboard / file</text>

  <!-- producteur -->
  <rect class="box" x="170" y="64" width="150" height="52" rx="3"/>
  <text class="label" x="245" y="86" text-anchor="middle">cat access.log</text>
  <text class="sub" x="245" y="102" text-anchor="middle" data-lang="fr">producteur de texte</text>
  <text class="sub" x="245" y="102" text-anchor="middle" data-lang="en">text producer</text>

  <!-- filtre (accent) -->
  <rect class="box-accent" x="360" y="64" width="150" height="52" rx="3"/>
  <text class="label label-on-fill" x="435" y="86" text-anchor="middle">grep "error"</text>
  <text class="sub sub-on-fill" x="435" y="102" text-anchor="middle" data-lang="fr">filtre les lignes</text>
  <text class="sub sub-on-fill" x="435" y="102" text-anchor="middle" data-lang="en">filters the lines</text>

  <!-- extracteur -->
  <rect class="box" x="550" y="64" width="170" height="52" rx="3"/>
  <text class="label" x="635" y="86" text-anchor="middle">awk '{print $1}'</text>
  <text class="sub" x="635" y="102" text-anchor="middle" data-lang="fr">extrait la colonne 1</text>
  <text class="sub" x="635" y="102" text-anchor="middle" data-lang="en">extracts column 1</text>

  <!-- flèches + pipes -->
  <path class="arrow-line" d="M 130 90 L 166 90"/>
  <path class="arrow-line" d="M 320 90 L 356 90"/>
  <text class="pipe" x="338" y="80" text-anchor="middle">|</text>
  <path class="arrow-line" d="M 510 90 L 546 90"/>
  <text class="pipe" x="528" y="80" text-anchor="middle">|</text>

  <!-- sorties -->
  <path class="arrow-line" d="M 610 116 L 462 216"/>
  <text class="sub" x="520" y="160" text-anchor="middle">stdout</text>
  <path class="arrow-line" d="M 655 116 L 655 216"/>
  <text class="pipe" x="672" y="170" text-anchor="start">&gt;</text>

  <!-- stderr -->
  <path class="arrow-err" d="M 400 116 L 165 216"/>
  <text class="sub" x="255" y="160" text-anchor="middle">stderr</text>

  <!-- terminal -->
  <rect class="box" x="360" y="220" width="170" height="56" rx="3"/>
  <text class="label" x="445" y="242" text-anchor="middle">terminal</text>
  <text class="sub" x="445" y="258" text-anchor="middle" data-lang="fr">affichage par défaut</text>
  <text class="sub" x="445" y="258" text-anchor="middle" data-lang="en">default display</text>

  <!-- fichier (redirection) -->
  <rect class="box" x="580" y="220" width="150" height="56" rx="3"/>
  <text class="label" x="655" y="242" text-anchor="middle">result.txt</text>
  <text class="sub" x="655" y="258" text-anchor="middle" data-lang="fr">&gt; écrase · &gt;&gt; ajoute</text>
  <text class="sub" x="655" y="258" text-anchor="middle" data-lang="en">&gt; overwrite · &gt;&gt; append</text>

  <!-- erreurs -->
  <rect class="box" x="40" y="220" width="200" height="56" rx="3"/>
  <text class="label" x="140" y="242" text-anchor="middle">2&gt; erreurs.log</text>
  <text class="sub" x="140" y="258" text-anchor="middle" data-lang="fr">erreurs : écran, ou redirigées</text>
  <text class="sub" x="140" y="258" text-anchor="middle" data-lang="en">errors: screen, or redirected</text>

  <!-- légende -->
  <text class="sub" x="380" y="322" text-anchor="middle" data-lang="fr">Chaque | branche le stdout d'une commande sur le stdin de la suivante.</text>
  <text class="sub" x="380" y="322" text-anchor="middle" data-lang="en">Each | plugs one command's stdout into the next command's stdin.</text>
  <text class="sub" x="380" y="340" text-anchor="middle" data-lang="fr">Le pipe ne transporte que stdout — stderr suit son propre chemin.</text>
  <text class="sub" x="380" y="340" text-anchor="middle" data-lang="en">The pipe only carries stdout — stderr takes its own path.</text>
</svg>
